<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scan Product ID - Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 20px;
      }
      .container {
        max-width: 420px;
        margin: auto;
        background: #fff;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
      }
      #reader {
        width: 100%;
        margin: 15px 0;
      }
      input {
        width: 100%;
        font-size: 18px;
        padding: 10px;
        text-align: center;
      }
      button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        margin-top: 10px;
        border: none;
        border-radius: 6px;
        background: #007bff;
        color: white;
      }
      button.stop {
        background: #dc3545;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Scan Product ID</h2>

      <button onclick="startScan()">Start Scan</button>

      <div id="reader"></div>

      <input type="text" id="product_id" placeholder="Hasil Scan" readonly />

      <button class="stop" onclick="stopScan()">Stop Camera</button>
    </div>

    <script>
      let html5QrCode;

      function startScan() {
        html5QrCode = new Html5Qrcode("reader");

        html5QrCode
          .start(
            { facingMode: "environment" }, // kamera belakang
            {
              fps: 10,
              qrbox: { width: 250, height: 250 },
            },
            (decodedText) => {
              document.getElementById("product_id").value = decodedText;
              stopScan();
            },
            (errorMessage) => {
              // optional error callback
            }
          )
          .catch((err) => {
            alert("Gagal membuka kamera: " + err);
          });
      }

      function stopScan() {
        if (html5QrCode) {
          html5QrCode.stop().then(() => {
            html5QrCode.clear();
          });
        }
      }
    </script>
  </body>
</html>
